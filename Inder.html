<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; display: flex; justify-content: center; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .container { width: 100%; max-width: 420px; padding: 30px 20px; z-index: 1; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-radius: 35px; padding: 35px 20px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .user-img { width: 130px; height: 130px; border-radius: 50%; border: 3px solid #00d2ff; box-shadow: 0 0 30px rgba(0, 210, 255, 0.4); margin-bottom: 15px; object-fit: cover; }
        .h-name { font-size: 26px; font-weight: 600; margin-bottom: 2px; }
        .v-nexus { font-family: 'Orbitron'; font-size: 13px; color: #00d2ff; letter-spacing: 4px; text-transform: uppercase; }
        .stats { display: flex; justify-content: center; gap: 30px; margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .s-item b { display: block; font-size: 22px; color: #fff; }
        .s-item span { font-size: 10px; color: #777; text-transform: uppercase; }
        .links { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; }
        .btn { background: rgba(255, 255, 255, 0.07); padding: 18px; border-radius: 20px; display: flex; align-items: center; border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; cursor: pointer; text-decoration: none; color: white; }
        .btn:hover { background: rgba(0, 210, 255, 0.15); border-color: #00d2ff; transform: scale(1.03); }
        .btn i { color: #00d2ff; margin-right: 15px; font-size: 20px; width: 30px; text-align: center; }
        .btn p { font-size: 15px; margin: 0; }
        .wa-float { position: fixed; bottom: 25px; right: 20px; background: #25D366; padding: 12px 22px; border-radius: 50px; font-weight: 600; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-decoration: none; color: white; z-index: 100; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="container">
        <div class="card">
            <img src="https://i.ibb.co/qYZhDkgL/1000069964.webp" class="user-img">
            <h2 class="h-name">Haroon Khan</h2>
            <p class="v-nexus">VIBENEXUS</p>
            <div class="stats">
                <div class="s-item"><b>6</b><span>Posts</span></div>
                <div class="s-item"><b>2</b><span>Followers</span></div>
                <div class="s-item"><b>7</b><span>Following</span></div>
            </div>
        </div>
        <div class="links">
            <div class="btn" onclick="go('Tech')"><i class="fas fa-code"></i><p>Tech & Coding Insights</p></div>
            <div class="btn" onclick="go('Viral')"><i class="fas fa-rocket"></i><p>Secret to Going Viral</p></div>
            <a href="https://youtube.com/@quiztime-d6n?si=OZguJZV7ZX1E6TDj" class="btn" target="_blank">
                <i class="fab fa-youtube" style="color:#ff0000;"></i><p>YouTube Channel</p>
            </a>
        </div>
    </div>
    <a href="https://wa.me/966542979275" class="wa-float" target="_blank"><i class="fab fa-whatsapp"></i> Chat Now</a>
    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        for(let i=0; i<50; i++) {
            particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vX: (Math.random() - 0.5) * 1, vY: (Math.random() - 0.5) * 1, r: Math.random() * 2 });
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = '#00d2ff';
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                p.x += p.vX; p.y += p.vY;
                if(p.x<0 || p.x>canvas.width) p.vX *= -1;
                if(p.y<0 || p.y>canvas.height) p.vY *= -1;
            });
            requestAnimationFrame(draw);
        }
        draw();
        function go(t) { window.open("https://wa.me/966542979275?text=" + encodeURIComponent("Hi Haroon! I'm interested in: " + t), '_blank'); }
    </script>
</body>
</html>
