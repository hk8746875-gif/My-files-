<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chafre AI - Haroon Khan</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: #121212; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .google-btn { background: #fff; color: #000; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 16px; box-shadow: 0 4px 15px rgba(255,255,255,0.1); }
        .header { padding: 10px; border-bottom: 1px solid #333; text-align: center; background: #111; }
        .header h1 { color: #00ff00; margin: 0; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        .chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #050505; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 15px; line-height: 1.4; }
        .user { background: #00ff00; color: #000; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: #222; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; border-left: 4px solid #00ff00; }
        .input-area { padding: 12px; display: flex; gap: 10px; background: #111; border-top: 1px solid #333; align-items: center; }
        input { flex: 1; background: #222; border: 1px solid #444; padding: 12px 18px; border-radius: 25px; color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: #00ff00; }
        .btn { background: #00ff00; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="color:#00ff00; font-size: 40px; margin-bottom: 10px;">Chafre AI</h1>
    <p style="color:#888; margin-bottom: 30px;">Created by Haroon Khan</p>
    <button id="login-btn" class="google-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
        Sign in to Start Chat
    </button>
    <p id="error-text" style="color: #ff4444; margin-top: 15px; font-size: 12px; display: none;"></p>
</div>

<div class="header"><h1>Chafre AI</h1></div>
<div id="chat-box" class="chat-box"></div>
<div class="input-area">
    <input type="text" id="user-input" placeholder="Yahan sawal poochein...">
    <button class="btn" id="send-btn">➤</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCkaDyQ_ixOM8nJXxkBkjzTRTtEsxgs5SM",
        authDomain: "harooonkhan-b6ba7.firebaseapp.com",
        projectId: "harooonkhan-b6ba7",
        storageBucket: "harooonkhan-b6ba7.firebasestorage.app",
        messagingSenderId: "111405675505",
        appId: "1:111405675505:web:d574df133c5c2baa9d8a50"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Fix for "Missing Initial State" - Set Persistence to Local
    setPersistence(auth, browserLocalPersistence);

    // Login logic using Redirect
    document.getElementById('login-btn').onclick = () => {
        signInWithRedirect(auth, provider);
    };

    // Handle the redirect result properly
    getRedirectResult(auth).catch((error) => {
        if (error.code === 'auth/unauthorized-domain') {
            document.getElementById('error-text').innerText = "Domain error! Please check Authorized Domains.";
        } else {
            document.getElementById('error-text').innerText = "Login error: " + error.message;
        }
        document.getElementById('error-text').style.display = 'block';
    });

    // Handle Login State
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            if(document.getElementById('chat-box').children.length === 0) {
                addMessage(`Assalam-o-Alaikum ${user.displayName}! Main Chafre AI hoon, aapki kya madad kar sakta hoon?`, 'ai');
            }
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        const box = document.getElementById('chat-box');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    // AI Responses and Input Handling
    document.getElementById('send-btn').onclick = () => {
        const input = document.getElementById('user-input');
        const val = input.value.trim();
        if (!val) return;

        addMessage(val, 'user');
        input.value = "";

        // Handling spelling mistakes (kan, kon, kaun)
        setTimeout(() => {
            const lowVal = val.toLowerCase();
            let reply = "Zabardast sawal hai! Main abhi seekh raha hoon.";
            
            if (lowVal.includes("kon") || lowVal.includes("kan") || lowVal.includes("kaun") || lowVal.includes("who")) {
                reply = "Main Chafre AI hoon, jise Haroon Khan ne banaya hai!";
            } else if (lowVal.includes("salam") || lowVal.includes("hi")) {
                reply = "Walaikum Assalam! Kaise hain aap?";
            }
            
            addMessage(reply, 'ai');
        }, 800);
    };
</script>
</body>
</html>
