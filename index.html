<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chafre AI - Haroon Khan</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: #121212; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .google-btn { background: #fff; color: #000; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 16px; }
        .header { padding: 10px; border-bottom: 1px solid #333; text-align: center; background: #111; }
        .header h1 { color: #00ff00; margin: 0; font-size: 22px; text-transform: uppercase; }
        .chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #050505; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 15px; }
        .user { background: #00ff00; color: #000; align-self: flex-end; }
        .ai { background: #222; color: #fff; align-self: flex-start; border-left: 4px solid #00ff00; }
        .input-area { padding: 12px; display: flex; gap: 10px; background: #111; border-top: 1px solid #333; }
        input { flex: 1; background: #222; border: 1px solid #444; padding: 12px; border-radius: 25px; color: #fff; outline: none; }
        .btn { background: #00ff00; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="color:#00ff00; font-size: 40px;">Chafre AI</h1>
    <p style="color:#666; margin-bottom: 30px;">Professional AI by Haroon Khan</p>
    <button id="login-btn" class="google-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
        Sign in to Continue
    </button>
</div>

<div class="header"><h1>Chafre AI</h1></div>
<div id="chat-box" class="chat-box"></div>
<div class="input-area">
    <input type="text" id="user-input" placeholder="Yahan likhein...">
    <button class="btn" id="send-btn">➤</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCkaDyQ_ixOM8nJXxkBkjzTRTtEsxgs5SM",
        authDomain: "harooonkhan-b6ba7.firebaseapp.com",
        projectId: "harooonkhan-b6ba7",
        storageBucket: "harooonkhan-b6ba7.firebasestorage.app",
        messagingSenderId: "111405675505",
        appId: "1:111405675505:web:d574df133c5c2baa9d8a50"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Direct Login Button
    document.getElementById('login-btn').onclick = () => {
        signInWithRedirect(auth, provider);
    };

    // Check Login State on Refresh
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            addMessage(`Assalam-o-Alaikum ${user.displayName}! Main Chafre AI hoon.`, 'ai');
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    // Handle Redirect Result to avoid 'Missing State' Error
    getRedirectResult(auth).catch((error) => {
        console.error("Login Error:", error.message);
    });

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        document.getElementById('chat-box').appendChild(div);
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    }

    document.getElementById('send-btn').onclick = () => {
        const input = document.getElementById('user-input');
        const val = input.value.trim().toLowerCase();
        if (!val) return;

        addMessage(input.value, 'user');
        input.value = "";

        setTimeout(() => {
            let reply = "Zabardast! Main mazeed seekh raha hoon.";
            if (val.includes("kon") || val.includes("kan") || val.includes("kaun")) {
                reply = "Main Haroon Khan ka AI assistant hoon!";
            }
            addMessage(reply, 'ai');
        }, 800);
    };
</script>
</body>
</html>
