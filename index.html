<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chafre AI Pro</title>
    <style>
        :root { 
            --primary: #00ff88; 
            --bg: #0a0a0c; 
            --card: #161b22; 
            --text: #e6edf3;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }

        .header { 
            padding: 15px; 
            text-align: center; 
            border-bottom: 1px solid #30363d; 
            background: rgba(22, 27, 34, 0.9);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .header h1 { 
            margin: 0; 
            font-size: 20px; 
            color: var(--primary); 
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            scroll-behavior: smooth;
        }

        .msg { 
            max-width: 80%; 
            padding: 12px 16px; 
            border-radius: 18px; 
            font-size: 15px; 
            line-height: 1.5; 
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .user { 
            align-self: flex-end; 
            background: var(--primary); 
            color: #000; 
            border-bottom-right-radius: 2px; 
            font-weight: 500;
        }

        .ai { 
            align-self: flex-start; 
            background: var(--card); 
            border: 1px solid #30363d; 
            border-bottom-left-radius: 2px; 
        }

        .input-wrapper { 
            padding: 15px; 
            background: #0a0a0c; 
            border-top: 1px solid #30363d;
        }

        .input-area { 
            max-width: 700px; 
            margin: 0 auto; 
            display: flex; 
            background: #1c2128; 
            border-radius: 30px; 
            padding: 5px 15px; 
            align-items: center; 
            border: 1px solid #444c56;
        }

        input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: white; 
            padding: 12px; 
            outline: none; 
            font-size: 16px;
        }

        .send-btn { 
            background: var(--primary); 
            border: none; 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: transform 0.2s;
        }

        .send-btn:hover { transform: scale(1.1); }
        .send-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div class="header">
    <h1>CHAFRE AI PRO</h1>
</div>

<div id="chat-box" class="chat-container">
    <div class="msg ai">Assalam-o-Alaikum! Main Chafre AI Pro hoon. Haroon Khan ne mujhe aapki madad ke liye design kiya hai. Poochiye, main aaj aapki kya madad kar sakta hoon?</div>
</div>

<div class="input-wrapper">
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
        <button class="send-btn" id="send-btn">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // Intelligent Auto-Replies
    const replies = [
        "Behtareen sawal hai! Main jald hi iska jawab doonga.",
        "Main abhi sabaq seekh raha hoon, Haroon Khan jald hi mujhe update karenge.",
        "Kya baat hai! Main aapki madad ke liye hamesha hazir hoon.",
        "Shukriya! Chafre AI ko pasand karne ka.",
        "Main abhi development phase mein hoon, mazeed features jald aayenge!",
        "Zabardast! Aap ka din kaisa guzar raha hai?"
    ];

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerText = text;
        chatBox.appendChild(div);
        
        // Auto Scroll
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleChat() {
        const message = userInput.value.trim();
        if (!message) return;

        // User message add karein
        addMessage(message, 'user');
        userInput.value = "";

        // Fake "Typing" feel ke liye delay
        setTimeout(() => {
            const randomReply = replies[Math.floor(Math.random() * replies.length)];
            addMessage(randomReply, 'ai');
        }, 800);
    }

    // Click event
    sendBtn.onclick = handleChat;

    // Enter key event
    userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            handleChat();
        }
    });
</script>

</body>
</html>
