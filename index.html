<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chafre AI Premium</title>
    <style>
        :root {
            --primary-color: #00ff88;
            --bg-dark: #0a0a0c;
            --card-bg: #161b22;
            --text-main: #e6edf3;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: radial-gradient(circle at top right, #1a2c23, #0a0a0c);
        }

        .header {
            padding: 20px;
            text-align: center;
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #30363d;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
            background: linear-gradient(to right, #00ff88, #60efff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user {
            align-self: flex-end;
            background: linear-gradient(135deg, #00ff88 0%, #00bd65 100%);
            color: #000;
            font-weight: 500;
            border-bottom-right-radius: 4px;
        }

        .ai {
            align-self: flex-start;
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-bottom-left-radius: 4px;
        }

        .typing {
            font-style: italic;
            font-size: 12px;
            color: var(--primary-color);
            margin-bottom: 10px;
            display: none;
        }

        .input-wrapper {
            padding: 20px;
            background: rgba(10, 10, 12, 0.9);
        }

        .input-area {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            background: #1c2128;
            border: 1px solid #444c56;
            border-radius: 30px;
            padding: 6px 15px;
            align-items: center;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            font-size: 16px;
            outline: none;
        }

        .send-btn {
            background: var(--primary-color);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>CHAFRE AI PRO</h1>
</div>

<div id="chat-box" class="chat-container">
    <div class="msg ai">Assalam-o-Alaikum! Main Chafre AI Pro hoon. Haroon Khan ne mujhe aapki madad ke liye design kiya hai. Poochiye, kya sawal hai aapka?</div>
</div>

<div id="typing-indicator" class="typing" style="padding-left: 20px;">Chafre AI is thinking...</div>

<div class="input-wrapper">
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
        <button class="send-btn" id="send-btn">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typing-indicator');

    // Gemini API Configuration
    const API_KEY = "AIzaSyCip_j8T3-C0o2V0BZcvDXocqALkqrBRQg"; 
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    async function getGeminiResponse(prompt) {
        typingIndicator.style.display = "block";
        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        } catch (error) {
            console.error("Error:", error);
            return "Maaf kijiye, connection mein masla hai. Dobara koshish karein.";
        } finally {
            typingIndicator.style.display = "none";
        }
    }

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function handleAction() {
        const val = userInput.value.trim();
        if (!val) return;

        addMessage(val, 'user');
        userInput.value = "";

        const aiResponse = await getGeminiResponse(val);
        addMessage(aiResponse, 'ai');
    }

    sendBtn.onclick = handleAction;
    userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleAction();
    });
</script>

</body>
</html>
