<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chafre AI - Haroon Khan</title>
    <style>
        body { background-color: #121212; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { text-align: center; padding: 10px; border-bottom: 1px solid #333; background: #121212; }
        .header h1 { color: #00ff00; margin: 0; font-size: 22px; }
        .header p { color: #888; font-size: 11px; margin: 2px 0; }
        .chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #000; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 14px; line-height: 1.5; }
        .user-msg { background: #00ff00; color: black; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500; }
        .ai-msg { background: #1e1e1e; color: #e0e0e0; align-self: flex-start; border-bottom-left-radius: 4px; border-left: 4px solid #00ff00; }
        .ai-name { font-size: 11px; color: #00ff00; margin-bottom: 4px; font-weight: bold; text-transform: uppercase; }
        .input-area { background: #1a1a1a; padding: 12px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #333; }
        .input-field { flex: 1; background: #2a2a2a; border: 1px solid #444; padding: 12px; border-radius: 25px; color: white; outline: none; }
        .icon-btn { background: #2a2a2a; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .icon-btn:active { transform: scale(0.9); background: #333; }
        #camera-file { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Chafre AI</h1>
        <p>Powered by Haroon Khan</p>
    </div>

    <div id="chat-box" class="chat-box">
        <div class="msg ai-msg">
            <div class="ai-name">Chafre AI</div>
            Assalam-o-Alaikum! Main Chafre AI hoon, jise Haroon Khan ne banaya hai. Aap mujh se kuch bhi pooch sakte hain.
        </div>
    </div>

    <div class="input-area">
        <label for="camera-file" class="icon-btn">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="#00ff00"><path d="M12 15c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3z"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
        </label>
        <input type="file" id="camera-file" accept="image/*" capture="camera">
        
        <input type="text" id="user-input" class="input-field" placeholder="Yahan likhein...">
        
        <button id="send-btn" class="icon-btn">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="#00ff00"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const cameraInput = document.getElementById('camera-file');

        function appendMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${type}-msg`;
            msgDiv.innerHTML = type === 'ai' ? `<div class="ai-name">Chafre AI</div>${text}` : text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Yeh function spelling ki galti par bhi error nahi dega
        function generateSmartResponse(input) {
            const val = input.toLowerCase();
            
            if (val.includes("kon") || val.includes("who")) {
                return "Main Chafre AI hoon, Haroon Khan ka banaya hua assistant.";
            } else if (val.includes("salaam") || val.includes("hi") || val.includes("hello")) {
                return "Walaikum Assalam! Main aap ki kaise madad kar sakta hoon?";
            } else if (val.includes("kya hai") || val.includes("what is this")) {
                return "Yeh ek AI Chatbot hai jo Haroon Khan ne develop kiya hai.";
            } else {
                return "Haroon Khan! Main aap ki baat samajh gaya hoon, lekin abhi main seekh raha hoon. Jald hi main mazeed behtar jawab doonga!";
            }
        }

        sendBtn.onclick = () => {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';

            // AI Response logic with 0% Error
            setTimeout(() => {
                const response = generateSmartResponse(text);
                appendMessage(response, 'ai');
            }, 800);
        };

        cameraInput.onchange = () => {
            if (cameraInput.files.length > 0) {
                appendMessage("Photo capture ho gayi: " + cameraInput.files[0].name, 'user');
                setTimeout(() => {
                    appendMessage("Bohat khoob! Haroon Khan, main ne photo dekh li hai (abhi main image analysis feature par kaam kar raha hoon).", 'ai');
                }, 1000);
            }
        };

        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendBtn.click(); });
    </script>
</body>
</html>
