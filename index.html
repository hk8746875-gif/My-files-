<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chafre AI - Haroon Khan</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: #121212; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .google-btn { background: #fff; color: #000; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 16px; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }
        .header { padding: 10px; border-bottom: 1px solid #333; text-align: center; background: #111; }
        .header h1 { color: #00ff00; margin: 0; font-size: 22px; text-transform: uppercase; letter-spacing: 2px; }
        .chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #050505; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 15px; line-height: 1.4; position: relative; }
        .user { background: #00ff00; color: #000; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: #222; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; border-left: 4px solid #00ff00; }
        .input-area { padding: 12px; display: flex; gap: 10px; background: #111; align-items: center; border-top: 1px solid #333; }
        input { flex: 1; background: #222; border: 1px solid #444; padding: 12px 18px; border-radius: 25px; color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: #00ff00; }
        .btn { background: #00ff00; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.2s; }
        .btn:active { transform: scale(0.9); }
        #camera-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1500; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .close-cam { position: absolute; top: 20px; right: 20px; background: red; color: white; border: none; padding: 10px; border-radius: 5px; z-index: 1600; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="color:#00ff00; font-size: 40px; margin-bottom: 5px;">Chafre AI</h1>
    <p style="color:#666; margin-bottom: 30px;">Professional AI Interface by Haroon Khan</p>
    <button id="login-btn" class="google-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
        Sign in with Google
    </button>
</div>

<div id="camera-container">
    <button class="close-cam" id="stop-cam">Close Camera</button>
    <video id="video" autoplay playsinline></video>
</div>

<div class="header">
    <h1>Chafre AI</h1>
</div>

<div id="chat-box" class="chat-box"></div>

<div class="input-area">
    <button class="btn" id="cam-btn" title="Open Camera">📷</button>
    <input type="text" id="user-input" placeholder="Type your message here...">
    <button class="btn" id="send-btn">➤</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Firebase Configuration from your screenshots
    const firebaseConfig = {
        apiKey: "AIzaSyCkaDyQ_ixOM8nJXxkBkjzTRTtEsxgs5SM",
        authDomain: "harooonkhan-b6ba7.firebaseapp.com",
        projectId: "harooonkhan-b6ba7",
        storageBucket: "harooonkhan-b6ba7.firebasestorage.app",
        messagingSenderId: "111405675505",
        appId: "1:111405675505:web:d574df133c5c2baa9d8a50"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const loginScreen = document.getElementById('login-screen');
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');

    // Login logic
    document.getElementById('login-btn').onclick = () => {
        signInWithPopup(auth, provider).catch(err => {
            alert("Error: " + err.message);
        });
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            loginScreen.style.display = 'none';
            addMessage(`Welcome ${user.displayName}! I am Chafre AI.`, 'ai');
        } else {
            loginScreen.style.display = 'flex';
        }
    });

    // Handle Word Mistakes (kan, kon, etc.)
    function getResponse(text) {
        const input = text.toLowerCase().trim();
        if (input.includes("kon") || input.includes("kan") || input.includes("kaun") || input.includes("who")) {
            return "Main Chafre AI hoon, jise Haroon Khan ne develop kiya hai.";
        }
        if (input.includes("salam") || input.includes("hi") || input.includes("hello")) {
            return "Walaikum Assalam! Main aapki kya madad kar sakta hoon?";
        }
        return "That's interesting! I'm still learning and improving every day.";
    }

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById('send-btn').onclick = () => {
        const val = userInput.value.trim();
        if (!val) return;
        addMessage(val, 'user');
        userInput.value = "";
        setTimeout(() => addMessage(getResponse(val), 'ai'), 800);
    };

    // Camera Logic (Back Camera)
    const video = document.getElementById('video');
    const camContainer = document.getElementById('camera-container');

    document.getElementById('cam-btn').onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
            camContainer.style.display = 'block';
        } catch (err) {
            alert("Camera access denied or not found.");
        }
    };

    document.getElementById('stop-cam').onclick = () => {
        const stream = video.srcObject;
        const tracks = stream.getTracks();
        tracks.forEach(track => track.stop());
        camContainer.style.display = 'none';
    };
</script>
</body>
</html>
